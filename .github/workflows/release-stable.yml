name: Release Stable

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '!v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Stable tag to release (e.g., v0.2.0)'
        required: true

permissions:
  contents: write
  id-token: write  # Required for attestations
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-tauri:
    name: Build Tauri App
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git auth for private repos
        uses: ./.github/actions/configure-private-git-auth
        with:
          token: ${{ secrets.MARTY_CORE_TOKEN }}

      - name: Get version from tag
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Verify version in Cargo.toml
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          WORKSPACE_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ "$VERSION" != "$WORKSPACE_VERSION" ]; then
            echo "Error: Tag version ($VERSION) doesn't match workspace version ($WORKSPACE_VERSION)"
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: ui
        run: pnpm build

      - name: Run tests
        run: cargo test --workspace --all-features

      - name: Import macOS certificate
        if: matrix.os == 'macos-latest'
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -n "$APPLE_CERTIFICATE_P12" ]; then
            echo "$APPLE_CERTIFICATE_P12" | base64 --decode > certificate.p12
            security create-keychain -p actions build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p actions build.keychain
            security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
            rm certificate.p12
          else
            echo "Warning: APPLE_CERTIFICATE_P12 not set, skipping code signing"
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: 'Marty Verifier ${{ steps.version.outputs.version }}'
          releaseBody: 'See changelog for details'
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

  create-updater-manifest:
    name: Create Auto-Updater Manifest
    needs: build-tauri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git auth for private repos
        uses: ./.github/actions/configure-private-git-auth
        with:
          token: ${{ secrets.MARTY_CORE_TOKEN }}

      - name: Get version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        run: |
          cargo install git-cliff
          git cliff --tag ${{ steps.version.outputs.tag }} --unreleased --strip all > RELEASE_NOTES.md

      - name: Install cargo-cyclonedx for SBOM
        run: cargo install cargo-cyclonedx

      - name: Generate SBOM
        run: |
          cargo cyclonedx --format json --override-filename marty-verifier-sbom

      - name: Download release assets
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ steps.version.outputs.tag }}
          fileName: '*'
          out-file-path: 'release-assets'

      - name: Validate signing artifacts exist
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MISSING=0
          for sig_file in \
            "release-assets/Marty-Verifier_${VERSION}_x64.app.tar.gz.sig" \
            "release-assets/Marty-Verifier_${VERSION}_aarch64.app.tar.gz.sig" \
            "release-assets/marty-verifier_${VERSION}_amd64.AppImage.tar.gz.sig" \
            "release-assets/Marty-Verifier_${VERSION}_x64-setup.nsis.zip.sig"; do
            if [ ! -f "$sig_file" ]; then
              echo "::error::Missing signature file: $sig_file"
              echo "Ensure TAURI_SIGNING_PRIVATE_KEY is configured in repository secrets."
              MISSING=1
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            exit 1
          fi
          echo "All signature files present."

      - name: Generate updater manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Read signatures from .sig files produced by tauri-action
          SIG_DARWIN_X64=$(cat "release-assets/Marty-Verifier_${VERSION}_x64.app.tar.gz.sig")
          SIG_DARWIN_AARCH64=$(cat "release-assets/Marty-Verifier_${VERSION}_aarch64.app.tar.gz.sig")
          SIG_LINUX_X64=$(cat "release-assets/marty-verifier_${VERSION}_amd64.AppImage.tar.gz.sig")
          SIG_WINDOWS_X64=$(cat "release-assets/Marty-Verifier_${VERSION}_x64-setup.nsis.zip.sig")

          # Build manifest with real signatures using jq
          jq -n \
            --arg version "$VERSION" \
            --arg notes "See full release notes at https://github.com/${REPO}/releases/tag/${TAG}" \
            --arg pub_date "$PUB_DATE" \
            --arg sig_darwin_x64 "$SIG_DARWIN_X64" \
            --arg url_darwin_x64 "${BASE_URL}/Marty-Verifier_${VERSION}_x64.app.tar.gz" \
            --arg sig_darwin_aarch64 "$SIG_DARWIN_AARCH64" \
            --arg url_darwin_aarch64 "${BASE_URL}/Marty-Verifier_${VERSION}_aarch64.app.tar.gz" \
            --arg sig_linux_x64 "$SIG_LINUX_X64" \
            --arg url_linux_x64 "${BASE_URL}/marty-verifier_${VERSION}_amd64.AppImage.tar.gz" \
            --arg sig_windows_x64 "$SIG_WINDOWS_X64" \
            --arg url_windows_x64 "${BASE_URL}/Marty-Verifier_${VERSION}_x64-setup.nsis.zip" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-x86_64": { signature: $sig_darwin_x64, url: $url_darwin_x64 },
                "darwin-aarch64": { signature: $sig_darwin_aarch64, url: $url_darwin_aarch64 },
                "linux-x86_64": { signature: $sig_linux_x64, url: $url_linux_x64 },
                "windows-x86_64": { signature: $sig_windows_x64, url: $url_windows_x64 }
              }
            }' > latest.json

          echo "Generated latest.json with real signatures:"
          cat latest.json

      - name: Generate attestations for release artifacts
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'release-assets/*.tar.gz'

      - name: Update release with manifest and notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Marty Verifier ${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: |
            latest.json
            marty-verifier-sbom.json
          prerelease: false
          generate_release_notes: true
