name: Release Stable

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '!v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Stable tag to release (e.g., v0.2.0)'
        required: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-tauri:
    name: Build Tauri App
    permissions:
      contents: write # Tauri creates the draft release and uploads installers.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0


      - name: Get version from tag
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${GITHUB_EVENT_INPUTS_TAG}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          {
            echo "tag=$TAG"
            echo "version=${TAG#v}"
          } >> "$GITHUB_OUTPUT"
        env:
          GITHUB_EVENT_INPUTS_TAG: ${{ github.event.inputs.tag }}

      - name: Verify version in Cargo.toml
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          WORKSPACE_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ "$VERSION" != "$WORKSPACE_VERSION" ]; then
            echo "Error: Tag version ($VERSION) doesn't match workspace version ($WORKSPACE_VERSION)"
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          targets: ${{ matrix.target }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "24"
          cache: 'pnpm'
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: ui
        run: pnpm build

      - name: Run tests
        run: cargo test --workspace --all-features

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: 'Marty Verifier ${{ steps.version.outputs.version }}'
          releaseBody: 'See changelog for details. macOS artifacts are unsigned and are not Apple-notarized; verify SHA256SUMS and GitHub build provenance before use.'
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

  create-updater-manifest:
    name: Create Auto-Updater Manifest
    permissions:
      contents: write
      id-token: write # Required for attestations.
      attestations: write
    needs: build-tauri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0


      - name: Get version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${GITHUB_EVENT_INPUTS_TAG}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          {
            echo "tag=$TAG"
            echo "version=${TAG#v}"
          } >> "$GITHUB_OUTPUT"
        env:
          GITHUB_EVENT_INPUTS_TAG: ${{ github.event.inputs.tag }}

      - name: Generate release notes
        run: |
          cargo install git-cliff
          git cliff --tag ${{ steps.version.outputs.tag }} --unreleased --strip all > RELEASE_NOTES.md

      - name: Install cargo-cyclonedx for SBOM
        run: cargo install cargo-cyclonedx

      - name: Generate SBOM
        run: |
          cargo cyclonedx --format json --override-filename marty-verifier-sbom

      - name: Download release assets
        uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f
        with:
          tag: ${{ steps.version.outputs.tag }}
          fileName: '*'
          out-file-path: 'release-assets'

      - name: Generate checksums
        working-directory: release-assets
        run: |
          find . -maxdepth 1 -type f ! -name '*.sig' -printf '%f\0' \
            | sort -z \
            | xargs -0 sha256sum > ../SHA256SUMS

      - name: Validate signing artifacts exist
        run: |
          MISSING=0
          for pattern in \
            '*_x64.app.tar.gz.sig' \
            '*_aarch64.app.tar.gz.sig' \
            '*_amd64.AppImage.tar.gz.sig' \
            '*_x64-setup.nsis.zip.sig'; do
            mapfile -t matches < <(find release-assets -maxdepth 1 -type f -name "$pattern")
            if [ "${#matches[@]}" -ne 1 ]; then
              echo "::error::Expected one signing artifact matching $pattern, found ${#matches[@]}"
              echo "Ensure TAURI_SIGNING_PRIVATE_KEY is configured in repository secrets."
              MISSING=1
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            exit 1
          fi
          echo "All signature files present."

      - name: Generate updater manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          resolve_sig() {
            local pattern="$1"
            local match
            match=$(find release-assets -maxdepth 1 -type f -name "$pattern" -print -quit)
            if [ -z "$match" ]; then
              echo "::error::No signing artifact matches $pattern" >&2
              exit 1
            fi
            printf '%s' "$match"
          }

          DARWIN_X64_SIG=$(resolve_sig '*_x64.app.tar.gz.sig')
          DARWIN_AARCH64_SIG=$(resolve_sig '*_aarch64.app.tar.gz.sig')
          LINUX_X64_SIG=$(resolve_sig '*_amd64.AppImage.tar.gz.sig')
          WINDOWS_X64_SIG=$(resolve_sig '*_x64-setup.nsis.zip.sig')

          SIG_DARWIN_X64=$(cat "$DARWIN_X64_SIG")
          SIG_DARWIN_AARCH64=$(cat "$DARWIN_AARCH64_SIG")
          SIG_LINUX_X64=$(cat "$LINUX_X64_SIG")
          SIG_WINDOWS_X64=$(cat "$WINDOWS_X64_SIG")

          URL_DARWIN_X64="${BASE_URL}/$(basename "${DARWIN_X64_SIG%.sig}")"
          URL_DARWIN_AARCH64="${BASE_URL}/$(basename "${DARWIN_AARCH64_SIG%.sig}")"
          URL_LINUX_X64="${BASE_URL}/$(basename "${LINUX_X64_SIG%.sig}")"
          URL_WINDOWS_X64="${BASE_URL}/$(basename "${WINDOWS_X64_SIG%.sig}")"

          # Build manifest with real signatures using jq
          jq -n \
            --arg version "$VERSION" \
            --arg notes "See full release notes at https://github.com/${REPO}/releases/tag/${TAG}" \
            --arg pub_date "$PUB_DATE" \
            --arg sig_darwin_x64 "$SIG_DARWIN_X64" \
            --arg url_darwin_x64 "$URL_DARWIN_X64" \
            --arg sig_darwin_aarch64 "$SIG_DARWIN_AARCH64" \
            --arg url_darwin_aarch64 "$URL_DARWIN_AARCH64" \
            --arg sig_linux_x64 "$SIG_LINUX_X64" \
            --arg url_linux_x64 "$URL_LINUX_X64" \
            --arg sig_windows_x64 "$SIG_WINDOWS_X64" \
            --arg url_windows_x64 "$URL_WINDOWS_X64" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-x86_64": { signature: $sig_darwin_x64, url: $url_darwin_x64 },
                "darwin-aarch64": { signature: $sig_darwin_aarch64, url: $url_darwin_aarch64 },
                "linux-x86_64": { signature: $sig_linux_x64, url: $url_linux_x64 },
                "windows-x86_64": { signature: $sig_windows_x64, url: $url_windows_x64 }
              }
            }' > latest.json

          echo "Generated latest.json with real signatures:"
          cat latest.json

      - name: Generate attestations for release artifacts
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018
        with:
          subject-path: |
            release-assets/*
            SHA256SUMS

      - name: Update release with manifest and notes
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Marty Verifier ${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: |
            latest.json
            marty-verifier-sbom.json
            SHA256SUMS
          prerelease: false
          generate_release_notes: true
