name: Cleanup Old Artifacts

on:
  schedule:
    # Run monthly on the 1st at 00:00 UTC
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    name: Cleanup Old Pre-1.0 Releases
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup old pre-release artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sixMonthsAgo = new Date();
            sixMonthsAgo.setMonth(sixMonthsAgo.getMonth() - 6);
            
            const releases = await github.rest.repos.listReleases({
              owner,
              repo,
              per_page: 100
            });
            
            const rcReleases = [];
            
            for (const release of releases.data) {
              const version = release.tag_name.replace(/^v/, '');
              const releaseDate = new Date(release.created_at);
              const isRC = release.tag_name.includes('-rc.');
              const isPre1_0 = version.startsWith('0.');
              
              if (!isPre1_0) {
                console.log(`Keeping: ${release.tag_name} (version 1.0+)`);
                continue;
              }
              
              if (isRC) {
                rcReleases.push({ release, releaseDate });
                continue;
              }
              
              if (releaseDate < sixMonthsAgo && isPre1_0) {
                console.log(`Deleting old pre-1.0 release: ${release.tag_name}`);
                
                const assets = await github.rest.repos.listReleaseAssets({
                  owner,
                  repo,
                  release_id: release.id
                });
                
                for (const asset of assets.data) {
                  await github.rest.repos.deleteReleaseAsset({
                    owner,
                    repo,
                    asset_id: asset.id
                  });
                }
                
                console.log(`Deleted assets for ${release.tag_name}`);
              } else {
                console.log(`Keeping: ${release.tag_name}`);
              }
            }
            
            rcReleases.sort((a, b) => b.releaseDate - a.releaseDate);
            for (let i = 3; i < rcReleases.length; i++) {
              const { release } = rcReleases[i];
              console.log(`Deleting old RC release: ${release.tag_name}`);
              
              const assets = await github.rest.repos.listReleaseAssets({
                owner,
                repo,
                release_id: release.id
              });
              
              for (const asset of assets.data) {
                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: asset.id
                });
              }
              
              console.log(`Deleted assets for ${release.tag_name}`);
            }
            
            console.log('Cleanup completed');
