name: Generate Changelog

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20
        with:
          tool: git-cliff

      - name: Generate changelog
        run: |
          git cliff --unreleased --prepend CHANGELOG.md --tag unreleased

      - name: Commit changelog
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403
        with:
          commit_message: "chore: update CHANGELOG.md"
          file_pattern: "CHANGELOG.md"
