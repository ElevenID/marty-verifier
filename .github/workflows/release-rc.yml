name: Release RC

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'RC tag to release (e.g., v0.2.0-rc.1)'
        required: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-tauri:
    name: Build Tauri App
    permissions:
      contents: write # Tauri creates the draft release and uploads installers.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0


      - name: Get version from tag
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${GITHUB_EVENT_INPUTS_TAG}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          {
            echo "tag=$TAG"
            echo "version=${TAG#v}"
          } >> "$GITHUB_OUTPUT"
        env:
          GITHUB_EVENT_INPUTS_TAG: ${{ github.event.inputs.tag }}

      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          targets: ${{ matrix.target }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 9

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: ui
        run: pnpm build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: 'Marty Verifier ${{ steps.version.outputs.version }} (RC)'
          releaseBody: 'Release Candidate - see changelog for details. macOS artifacts are unsigned and are not Apple-notarized; verify SHA256SUMS and GitHub build provenance before use.'
          releaseDraft: false
          prerelease: true
          args: --target ${{ matrix.target }}

  create-release:
    name: Consolidate RC Release
    permissions:
      contents: write
      id-token: write # Required for attestations.
      attestations: write
    needs: build-tauri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0


      - name: Get version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${GITHUB_EVENT_INPUTS_TAG}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          {
            echo "tag=$TAG"
            echo "version=${TAG#v}"
          } >> "$GITHUB_OUTPUT"
        env:
          GITHUB_EVENT_INPUTS_TAG: ${{ github.event.inputs.tag }}

      - name: Generate release notes
        run: |
          cargo install git-cliff
          git cliff --tag ${{ steps.version.outputs.tag }} --unreleased --strip all > RELEASE_NOTES.md

      - name: Install cargo-cyclonedx for SBOM
        run: cargo install cargo-cyclonedx

      - name: Generate SBOM
        run: |
          cargo cyclonedx --format json --override-filename marty-verifier-sbom

      - name: Download release assets
        uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f
        with:
          tag: ${{ steps.version.outputs.tag }}
          fileName: '*'
          out-file-path: 'release-assets'

      - name: Generate checksums
        working-directory: release-assets
        run: |
          find . -maxdepth 1 -type f ! -name '*.sig' -printf '%f\0' \
            | sort -z \
            | xargs -0 sha256sum > ../SHA256SUMS

      - name: Generate attestations for release artifacts
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018
        with:
          subject-path: |
            release-assets/*
            SHA256SUMS

      - name: Update release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Marty Verifier ${{ steps.version.outputs.version }} (RC)
          body_path: RELEASE_NOTES.md
          files: |
            marty-verifier-sbom.json
            SHA256SUMS
          prerelease: true
          generate_release_notes: true
