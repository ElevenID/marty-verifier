name: Auto-Update Dependencies

on:
  repository_dispatch:
    types: [marty-core-released]
  workflow_dispatch:
    inputs:
      marty_core_tag:
        description: 'marty-core tag to update to (e.g., v0.2.0)'
        required: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  update-dependencies:
    name: Update marty-core Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git auth for private repos
        uses: ./.github/actions/configure-private-git-auth
        with:
          token: ${{ secrets.MARTY_CORE_TOKEN }}

      - name: Get marty-core version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.marty_core_tag }}"
          else
            TAG="${{ github.event.client_payload.tag }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Update Cargo.toml dependencies
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          
          # Update git tag references in workspace Cargo.toml
          sed -i.bak "s|marty-crypto = { git = \"https://github.com/ElevenID/marty-core\", branch = \"main\" }|marty-crypto = { git = \"https://github.com/ElevenID/marty-core\", tag = \"$TAG\" }|g" Cargo.toml
          sed -i.bak "s|marty-verification = { git = \"https://github.com/ElevenID/marty-core\", branch = \"main\"|marty-verification = { git = \"https://github.com/ElevenID/marty-core\", tag = \"$TAG\"|g" Cargo.toml
          sed -i.bak "s|marty-biometrics = { git = \"https://github.com/ElevenID/marty-core\", branch = \"main\"|marty-biometrics = { git = \"https://github.com/ElevenID/marty-core\", tag = \"$TAG\"|g" Cargo.toml
          
          # Also update any existing tag references
          sed -i.bak "s|marty-crypto = { git = \"https://github.com/ElevenID/marty-core\", tag = \"v[0-9.]*\" }|marty-crypto = { git = \"https://github.com/ElevenID/marty-core\", tag = \"$TAG\" }|g" Cargo.toml
          sed -i.bak "s|tag = \"v[0-9.]*\"|tag = \"$TAG\"|g" Cargo.toml
          
          rm -f Cargo.toml.bak

      - uses: dtolnay/rust-toolchain@stable

      - name: Update Cargo.lock
        run: cargo update -p marty-crypto -p marty-verification -p marty-biometrics

      - name: Run tests
        id: tests
        continue-on-error: true
        run: cargo test --workspace --all-features

      - name: Auto-bump version
        if: steps.tests.outcome == 'success'
        run: |
          CURRENT_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          
          # Parse version components
          MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
          MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
          PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)
          
          # Increment patch version
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          
          # Update version in Cargo.toml
          sed -i.bak "s/^version = \"$CURRENT_VERSION\"/version = \"$NEW_VERSION\"/" Cargo.toml
          rm -f Cargo.toml.bak
          
          # Update version in tauri.conf.json
          cd src-tauri
          sed -i.bak "s/\"version\": \"$CURRENT_VERSION\"/\"version\": \"$NEW_VERSION\"/" tauri.conf.json
          rm -f tauri.conf.json.bak
          cd ..
          
          # Update version in package.json
          cd ui
          sed -i.bak "s/\"version\": \"$CURRENT_VERSION\"/\"version\": \"$NEW_VERSION\"/" package.json
          rm -f package.json.bak
          cd ..
          
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "Updated version from $CURRENT_VERSION to $NEW_VERSION"

      - name: Commit and push changes
        if: steps.tests.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock src-tauri/tauri.conf.json ui/package.json
          git commit -m "chore(deps): update marty-core to ${{ steps.version.outputs.tag }} and bump to v$NEW_VERSION"
          git push

      - name: Create release tag
        if: steps.tests.outcome == 'success'
        run: |
          git tag "v$NEW_VERSION"
          git push origin "v$NEW_VERSION"

      - name: Create GitHub Issue on failure
        if: steps.tests.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Failed to auto-update marty-core to ${{ steps.version.outputs.tag }}`,
              body: `## Auto-Update Failed
              
              The automated dependency update from marty-core ${{ steps.version.outputs.tag }} failed during testing.
              
              **marty-core version:** ${{ steps.version.outputs.tag }}
              **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
              
              ### Action Required
              
              1. Review the test failures in the workflow run linked above
              2. Manually update dependencies if needed:
                 \`\`\`bash
                 # Update Cargo.toml git tag references
                 # Run: cargo update -p marty-crypto -p marty-verification -p marty-biometrics
                 # Run tests: cargo test --workspace --all-features
                 \`\`\`
              3. Once fixed, manually bump version and create release tag
              
              ### Tests Output
              
              Check the workflow logs for detailed test failure information.
              `,
              labels: ['dependencies', 'automated', 'needs-investigation']
            });
            
            console.log(`Created issue #${issue.data.number}`);
