name: Publish marty-sync

on:
  push:
    tags:
      - "marty-sync-v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable
      - name: Verify tag and package version
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#marty-sync-v}"
          package_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "marty-sync") | .version')"
          test "$version" = "$package_version"
      - run: cargo test --locked -p marty-sync
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: crates/marty-sync
          format: spdx-json
          output-file: marty-sync.spdx.json
      - name: Collect release assets
        shell: bash
        run: |
          mkdir release-assets
          version="${GITHUB_REF_NAME#marty-sync-v}"
          git archive --format=tar.gz \
            --prefix="marty-sync-${version}/" \
            --output="release-assets/marty-sync-${version}.tar.gz" \
            HEAD:crates/marty-sync
          cp marty-sync.spdx.json release-assets/
          (cd release-assets && sha256sum ./* > SHA256SUMS)
      - uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159
      - name: Sign release assets
        shell: bash
        run: |
          find release-assets -type f ! -name '*.sigstore.json' -print0 | while IFS= read -r -d '' file; do
            cosign sign-blob --yes --bundle "${file}.sigstore.json" "$file"
          done
      - uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661
        with:
          subject-path: release-assets/**
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          generate_release_notes: true
          files: release-assets/**

  publish-crates-io:
    if: vars.ENABLE_PUBLIC_REGISTRY_PUBLISHING == 'true'
    needs: build-release
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable
      - run: cargo publish --locked -p marty-sync
