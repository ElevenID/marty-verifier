# Configuration for cargo-deny
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
# Targets to check dependencies for
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]

[advisories]
# The path where the advisory database is cloned/fetched into
db-path = "~/.cargo/advisory-db"
# The url(s) of the advisory databases to use
db-urls = ["https://github.com/rustsec/advisory-db"]
# Vulnerability level that will fail the check
vulnerability = "deny"
# Unmaintained crate advisories will fail the check
unmaintained = "warn"
# Yanked crate detection
yanked = "warn"
# Notices (informational advisories)
notice = "warn"
# A list of advisory IDs to ignore (useful for false positives)
ignore = [
    #"RUSTSEC-0000-0000",
]

[licenses]
# Licensing confidence threshold (0.0 - 1.0)
confidence-threshold = 0.8
# List of explicitly allowed licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Zlib",
    "0BSD",
]
# List of explicitly denied licenses
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-3.0",
]
# Copyleft licenses should be flagged
copyleft = "warn"
# Allow 1 or more licenses on a per-crate basis
exceptions = [
    # ring uses a custom license that is permissive but not OSI approved
    { allow = ["OpenSSL", "ISC"], name = "ring" },
    # webpki-roots uses MPL-2.0 which is weak copyleft but commonly used for Mozilla projects
    { allow = ["MPL-2.0"], name = "webpki-roots" },
]

[bans]
# Warn on multiple versions of the same crate
multiple-versions = "warn"
# Skip dependencies that do not have a version number
wildcards = "allow"
# List of crates that are allowed to have multiple versions
skip = []
# List of explicitly denied crates
deny = []

[sources]
# Warn if a crate is from an unknown registry
unknown-registry = "warn"
# Warn if a crate is from a git repository
unknown-git = "warn"
# List of allowed git sources
allow-git = []
